name: Job Alert Bot

on:
  schedule:
    # Runs every 30 minutes. GitHub Actions free tier minimum useful interval.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job alert script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: python job_alert.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "job-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs list"
          git push
          
